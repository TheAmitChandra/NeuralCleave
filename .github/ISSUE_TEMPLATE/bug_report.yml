name: Bug report
description: Report something that isn't working as expected
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please fill out as much of this as you can — it saves a lot of back-and-forth.
  - type: input
    id: version
    attributes:
      label: NeuralCleave version
      description: Output of `neuralcleave --version`, or the release tag if using the desktop app
      placeholder: v2.1.0
    validations:
      required: true
  - type: dropdown
    id: install-method
    attributes:
      label: Install method
      options:
        - pip (PyPI)
        - Desktop app (Tauri, macOS)
        - Desktop app (Tauri, Windows)
        - Docker / docker-compose
        - From source
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: OS and Python version
      placeholder: "Windows 11, Python 3.12.4"
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: What did you do, and what channel/LLM provider (if any) was involved?
      placeholder: |
        1. Configure Telegram channel with ...
        2. Run `neuralcleave gateway start`
        3. Send a message ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: Include any error messages, stack traces, or relevant log lines
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      render: shell
