name: Feature request
description: Suggest an idea or improvement for NeuralCleave
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Have an idea for a new channel adapter, LLM provider, or feature? Let us know.
  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: What are you trying to do that NeuralCleave doesn't support today?
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: How would you like this to work?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
  - type: textarea
    id: additional
    attributes:
      label: Additional context
