name: Deploy

on:
  push:
    branches: [main]
    tags:
      - "v*.*.*"

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_BACKEND: ghcr.io/${{ github.repository_owner }}/neuralcleave-backend
  IMAGE_FRONTEND: ghcr.io/${{ github.repository_owner }}/NeuralCleave-frontend

jobs:
  build-backend:
    name: Build Backend Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    outputs:
      image_tag: ${{ steps.meta.outputs.tags }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_BACKEND }}
          tags: |
            type=ref,event=branch
            type=semver,pattern=v{{version}}
            type=semver,pattern=v{{major}}.{{minor}}
            type=sha,prefix=sha-,format=short

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: backend
          file: backend/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

  build-frontend:
    name: Build Frontend Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    outputs:
      image_tag: ${{ steps.meta.outputs.tags }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_FRONTEND }}
          tags: |
            type=ref,event=branch
            type=semver,pattern=v{{version}}
            type=semver,pattern=v{{major}}.{{minor}}
            type=sha,prefix=sha-,format=short

      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: frontend
          file: frontend/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            NEXT_PUBLIC_API_URL=${{ vars.NEXT_PUBLIC_API_URL }}
            NEXT_PUBLIC_WS_URL=${{ vars.NEXT_PUBLIC_WS_URL }}
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend

  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: [build-backend, build-frontend]
    environment: staging
    if: ${{ github.ref == 'refs/heads/main' }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4

      - name: Configure kubeconfig
        id: kubeconfig
        run: |
          if [ -z "${{ secrets.KUBECONFIG_STAGING }}" ]; then
            echo "KUBECONFIG_STAGING secret is not configured — staging deploy skipped"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            mkdir -p "$HOME/.kube"
            echo "${{ secrets.KUBECONFIG_STAGING }}" | base64 -d > "$HOME/.kube/config"
            chmod 600 "$HOME/.kube/config"
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Apply Kubernetes manifests
        if: ${{ steps.kubeconfig.outputs.skip != 'true' }}
        run: |
          kubectl apply -f deploy/k8s/namespace.yaml
          kubectl apply -f deploy/k8s/postgres.yaml
          kubectl apply -f deploy/k8s/redis.yaml
          kubectl apply -f deploy/k8s/qdrant.yaml
          kubectl apply -f deploy/k8s/neo4j.yaml
          kubectl apply -f deploy/k8s/backend.yaml
          kubectl apply -f deploy/k8s/frontend.yaml
          kubectl apply -f deploy/k8s/ingress.yaml

      - name: Compute short SHA
        if: ${{ steps.kubeconfig.outputs.skip != 'true' }}
        id: sha
        run: echo "short=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Update backend image tag
        if: ${{ steps.kubeconfig.outputs.skip != 'true' }}
        run: |
          kubectl set image deployment/neuralcleave-backend \
            backend=${{ env.IMAGE_BACKEND }}:sha-${{ steps.sha.outputs.short }} \
            -n NeuralCleave

      - name: Update frontend image tag
        if: ${{ steps.kubeconfig.outputs.skip != 'true' }}
        run: |
          kubectl set image deployment/NeuralCleave-frontend \
            frontend=${{ env.IMAGE_FRONTEND }}:sha-${{ steps.sha.outputs.short }} \
            -n NeuralCleave

      - name: Wait for rollout
        if: ${{ steps.kubeconfig.outputs.skip != 'true' }}
        run: |
          kubectl rollout status deployment/neuralcleave-backend -n NeuralCleave --timeout=120s || \
            (kubectl rollout undo deployment/neuralcleave-backend -n NeuralCleave && exit 1)
          kubectl rollout status deployment/NeuralCleave-frontend -n NeuralCleave --timeout=120s || \
            (kubectl rollout undo deployment/NeuralCleave-frontend -n NeuralCleave && exit 1)

  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [build-backend, build-frontend]
    environment: production
    if: ${{ startsWith(github.ref, 'refs/tags/v') }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4

      - name: Configure kubeconfig
        id: kubeconfig
        run: |
          if [ -z "${{ secrets.KUBECONFIG_PRODUCTION }}" ]; then
            echo "KUBECONFIG_PRODUCTION secret is not configured — production deploy skipped"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            mkdir -p "$HOME/.kube"
            echo "${{ secrets.KUBECONFIG_PRODUCTION }}" | base64 -d > "$HOME/.kube/config"
            chmod 600 "$HOME/.kube/config"
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Apply Kubernetes manifests
        if: ${{ steps.kubeconfig.outputs.skip != 'true' }}
        run: |
          kubectl apply -f deploy/k8s/namespace.yaml
          kubectl apply -f deploy/k8s/postgres.yaml
          kubectl apply -f deploy/k8s/redis.yaml
          kubectl apply -f deploy/k8s/qdrant.yaml
          kubectl apply -f deploy/k8s/neo4j.yaml
          kubectl apply -f deploy/k8s/backend.yaml
          kubectl apply -f deploy/k8s/frontend.yaml
          kubectl apply -f deploy/k8s/ingress.yaml

      - name: Update backend image tag
        if: ${{ steps.kubeconfig.outputs.skip != 'true' }}
        run: |
          kubectl set image deployment/neuralcleave-backend \
            backend=${{ env.IMAGE_BACKEND }}:${{ github.ref_name }} \
            -n NeuralCleave

      - name: Update frontend image tag
        if: ${{ steps.kubeconfig.outputs.skip != 'true' }}
        run: |
          kubectl set image deployment/NeuralCleave-frontend \
            frontend=${{ env.IMAGE_FRONTEND }}:${{ github.ref_name }} \
            -n NeuralCleave

      - name: Wait for rollout
        if: ${{ steps.kubeconfig.outputs.skip != 'true' }}
        run: |
          kubectl rollout status deployment/neuralcleave-backend -n NeuralCleave --timeout=180s || \
            (kubectl rollout undo deployment/neuralcleave-backend -n NeuralCleave && exit 1)
          kubectl rollout status deployment/NeuralCleave-frontend -n NeuralCleave --timeout=180s || \
            (kubectl rollout undo deployment/NeuralCleave-frontend -n NeuralCleave && exit 1)
