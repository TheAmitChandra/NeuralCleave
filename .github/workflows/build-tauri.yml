name: Build Tauri Installers

# Builds the desktop app's installers for all three platforms. Windows
# (.msi + NSIS .exe) was already verified by hand on a real Windows machine
# (see docs/IMPLEMENTATION_PLAN_v2.md) — this workflow is what actually
# produces the macOS (.dmg) and Linux (.AppImage/.deb) installers, which
# can't be built or tested on the Windows machine this project has been
# developed on.
#
# Every run (manual or release-triggered) uploads the bundle output as a
# regular workflow artifact, so installers are always downloadable for
# inspection regardless of trigger. Attaching them to a GitHub Release is a
# separate, explicit step that only runs when the workflow was actually
# triggered by a published release — manual test runs never touch release
# assets.

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  build:
    name: Build (${{ matrix.platform }})
    strategy:
      fail-fast: false
      matrix:
        platform: [macos-latest, ubuntu-latest, windows-latest]

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: frontend/src-tauri

      - name: Install Linux system dependencies
        if: matrix.platform == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build Tauri installers
        working-directory: frontend
        run: npx tauri build

      - name: Upload installers as a workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: cortexflow-ai-desktop-${{ matrix.platform }}
          path: |
            frontend/src-tauri/target/release/bundle/msi/*.msi
            frontend/src-tauri/target/release/bundle/nsis/*.exe
            frontend/src-tauri/target/release/bundle/dmg/*.dmg
            frontend/src-tauri/target/release/bundle/appimage/*.AppImage
            frontend/src-tauri/target/release/bundle/deb/*.deb
          if-no-files-found: error
          retention-days: 30

      - name: Attach installers to the GitHub Release
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        working-directory: frontend/src-tauri/target/release/bundle
        # No glob matches every file on every platform (e.g. no msi/ dir on
        # Linux) — `shopt -s nullglob` makes unmatched patterns expand to
        # nothing instead of erroring, so `gh release upload` only ever
        # sees files that actually exist on this platform.
        shell: bash
        run: |
          shopt -s nullglob
          files=(msi/*.msi nsis/*.exe dmg/*.dmg appimage/*.AppImage deb/*.deb)
          if [ ${#files[@]} -eq 0 ]; then
            echo "No installer files found to upload" >&2
            exit 1
          fi
          gh release upload "${{ github.event.release.tag_name }}" "${files[@]}" --clobber
