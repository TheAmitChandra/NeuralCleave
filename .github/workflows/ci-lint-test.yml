name: Lint + Test

on:
  workflow_call:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  lint-test:
    name: Lint + Test (Python 3.12)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]" ruff

      - name: Lint (ruff)
        run: ruff check neuralcleave tests --select E,F,W,I --ignore E501

      - name: Run tests
        run: pytest tests/ -v --tb=short -q
