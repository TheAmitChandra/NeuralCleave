name: SDK

on:
  workflow_call:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  sdk:
    name: neuralcleave-sdk (Python 3.12)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install neuralcleave-sdk
        run: pip install -e "./neuralcleave-sdk[dev]" ruff

      - name: Lint neuralcleave-sdk (ruff)
        run: ruff check neuralcleave-sdk/src neuralcleave-sdk/tests --select E,F,W,I --ignore E501

      - name: Test neuralcleave-sdk
        run: pytest neuralcleave-sdk/tests/ -v --tb=short -q
