name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  # ── Lint + Test ─────────────────────────────────────────────────────────────
  test:
    name: Lint + Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: ["3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]" ruff

      - name: Lint (ruff)
        run: ruff check neuralcleave tests --select E,F,W,I --ignore E501

      - name: Run tests
        run: pytest tests/ -v --tb=short -q

      - name: Install neuralcleave-sdk
        run: pip install -e "./neuralcleave-sdk[dev]"

      - name: Lint neuralcleave-sdk (ruff)
        run: ruff check neuralcleave-sdk/src neuralcleave-sdk/tests --select E,F,W,I --ignore E501

      - name: Test neuralcleave-sdk
        run: pytest neuralcleave-sdk/tests/ -v --tb=short -q

      - name: Install example plugins
        run: |
          pip install -e "./examples/plugins/neuralcleave-github[dev]"
          pip install -e "./examples/plugins/neuralcleave-notion[dev]"
          pip install -e "./examples/plugins/neuralcleave-google-calendar[dev]"

      - name: Lint example plugins (ruff)
        run: ruff check examples/plugins --select E,F,W,I --ignore E501

      - name: Test example plugins
        run: |
          pytest examples/plugins/neuralcleave-github/tests -v --tb=short -q
          pytest examples/plugins/neuralcleave-notion/tests -v --tb=short -q
          pytest examples/plugins/neuralcleave-google-calendar/tests -v --tb=short -q

  # ── Docker Build + Push to GHCR ─────────────────────────────────────────────
  docker:
    name: Docker Build + Push
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/theamitchandra/neuralcleave
          tags: |
            type=raw,value=latest
            type=sha,prefix=sha-,format=short

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
