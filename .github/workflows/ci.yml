name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

# Aggregates all separate workflow checks so a single "CI" status appears
# on pull requests. Each child workflow also runs independently.

jobs:
  lint-test:
    uses: ./.github/workflows/ci-lint-test.yml

  sdk:
    uses: ./.github/workflows/ci-sdk.yml

  plugins:
    uses: ./.github/workflows/ci-plugins.yml

  docker:
    uses: ./.github/workflows/ci-docker.yml
    needs: [lint-test, sdk, plugins]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    secrets: inherit
