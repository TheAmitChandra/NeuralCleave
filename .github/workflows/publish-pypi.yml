name: Publish to PyPI

# Publishing is irreversible (PyPI allows yanking a release but never
# deleting/reusing a version number), so this never runs on a routine
# push to main. It runs when a GitHub Release is published — cutting a
# release is the one deliberate action that replaces clicking "Run
# workflow" manually. workflow_dispatch is kept as a manual fallback.
#
# Which package a release publishes is decided by the release's tag
# prefix:
#   app-v*             -> neuralcleave (the main gateway, repo root)
#   sdk-v*             -> NeuralCleave-sdk
#   github-plugin-v*   -> NeuralCleave-github
#   notion-plugin-v*   -> NeuralCleave-notion
#   calendar-plugin-v* -> NeuralCleave-google-calendar
#
# See docs/PUBLISHING.md for the per-project Trusted Publisher (OIDC)
# setup this depends on.
on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      package:
        description: "Which package to publish (manual trigger only)"
        required: true
        type: choice
        options:
          - neuralcleave
          - NeuralCleave-sdk
          - NeuralCleave-github
          - NeuralCleave-notion
          - NeuralCleave-google-calendar

jobs:
  publish:
    name: Build + publish
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      contents: read # required for actions/checkout on this private repo
      id-token: write # required for PyPI Trusted Publishing

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Resolve package and directory
        id: resolve
        env:
          DISPATCH_PACKAGE: ${{ github.event_name == 'workflow_dispatch' && inputs.package || '' }}
          RELEASE_TAG: ${{ github.event_name == 'release' && github.event.release.tag_name || '' }}
        run: |
          if [ -n "$DISPATCH_PACKAGE" ]; then
            PKG="$DISPATCH_PACKAGE"
          else
            case "$RELEASE_TAG" in
              app-v*) PKG="neuralcleave" ;;
              sdk-v*) PKG="NeuralCleave-sdk" ;;
              github-plugin-v*) PKG="NeuralCleave-github" ;;
              notion-plugin-v*) PKG="NeuralCleave-notion" ;;
              calendar-plugin-v*) PKG="NeuralCleave-google-calendar" ;;
              *)
                echo "Unrecognized release tag '$RELEASE_TAG' — expected one of: app-v*, sdk-v*, github-plugin-v*, notion-plugin-v*, calendar-plugin-v*" >&2
                exit 1
                ;;
            esac
          fi

          case "$PKG" in
            neuralcleave) DIR="." ;;
            NeuralCleave-sdk) DIR="NeuralCleave-sdk" ;;
            NeuralCleave-github) DIR="examples/plugins/NeuralCleave-github" ;;
            NeuralCleave-notion) DIR="examples/plugins/NeuralCleave-notion" ;;
            NeuralCleave-google-calendar) DIR="examples/plugins/NeuralCleave-google-calendar" ;;
          esac

          echo "package=$PKG" >> "$GITHUB_OUTPUT"
          echo "dir=$DIR" >> "$GITHUB_OUTPUT"

      - name: Install build tooling
        run: pip install build twine

      - name: Build sdist + wheel
        run: python -m build "${{ steps.resolve.outputs.dir }}"

      - name: Check distributions
        run: python -m twine check ${{ steps.resolve.outputs.dir }}/dist/*

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: ${{ steps.resolve.outputs.dir }}/dist
