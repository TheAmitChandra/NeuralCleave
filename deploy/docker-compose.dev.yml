version: "3.9"

services:
  # ── Databases ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: cortexflow-postgres
    environment:
      POSTGRES_USER: cortex
      POSTGRES_PASSWORD: cortex
      POSTGRES_DB: cortexflow
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cortex -d cortexflow"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: cortexflow-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:v1.12.4
    container_name: cortexflow-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5

  neo4j:
    image: neo4j:5.26-community
    container_name: cortexflow-neo4j
    environment:
      NEO4J_AUTH: neo4j/cortexflow
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_security_procedures_unrestricted: apoc.*
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ["CMD", "neo4j", "status"]
      interval: 15s
      timeout: 10s
      retries: 5

  # ── Observability ─────────────────────────────────────────────────────────
  # In dev mode the backend runs locally (uvicorn --reload). Prometheus scrapes
  # host.docker.internal:9090 to reach the locally-running prometheus_client server.
  # On Linux hosts, the extra_hosts entry maps host.docker.internal to the gateway.
  prometheus:
    image: prom/prometheus:v3.3.1
    container_name: cortexflow-prometheus-dev
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=7d"
      - "--web.enable-lifecycle"
    ports:
      - "9091:9090"
    volumes:
      - ./prometheus/prometheus.dev.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_dev_data:/prometheus
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  # ── OpenTelemetry Collector (dev) ─────────────────────────────────────────
  # Receives OTLP traces/metrics/logs from the backend running on the host
  # (host.docker.internal:4317 / 4318) and forwards to Prometheus.
  # Set OTEL_EXPORTER_OTLP_ENDPOINT=http://localhost:4317 in your local .env.
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.123.0
    container_name: cortexflow-otel-dev
    command: ["--config=/etc/otel/otel-collector.dev.yml"]
    ports:
      - "4317:4317"   # OTLP gRPC — backend → collector
      - "4318:4318"   # OTLP HTTP — browser / other sources
      - "8889:8889"   # Prometheus scrape endpoint (collector metrics)
      - "13133:13133" # Health check extension
    volumes:
      - ./otel/otel-collector.dev.yml:/etc/otel/otel-collector.dev.yml:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:13133"]
      interval: 15s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  qdrant_data:
  neo4j_data:
  prometheus_dev_data:
