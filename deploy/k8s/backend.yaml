apiVersion: apps/v1
kind: Deployment
metadata:
  name: neuralcleave-backend
  namespace: NeuralCleave
  labels:
    app: neuralcleave-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: neuralcleave-backend
  template:
    metadata:
      labels:
        app: neuralcleave-backend
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
      containers:
        - name: backend
          image: NeuralCleave/backend:latest
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: NeuralCleave-config
            - secretRef:
                name: NeuralCleave-secrets
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 5
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "2Gi"
---
apiVersion: v1
kind: Service
metadata:
  name: neuralcleave-backend
  namespace: NeuralCleave
spec:
  selector:
    app: neuralcleave-backend
  ports:
    - protocol: TCP
      port: 8000
      targetPort: 8000
