apiVersion: apps/v1
kind: Deployment
metadata:
  name: NeuralCleave-celery
  namespace: NeuralCleave
  labels:
    app: NeuralCleave-celery
spec:
  replicas: 2
  selector:
    matchLabels:
      app: NeuralCleave-celery
  template:
    metadata:
      labels:
        app: NeuralCleave-celery
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
      containers:
        - name: celery-worker
          image: NeuralCleave/backend:latest
          command:
            - celery
            - -A
            - app.workers.celery_app
            - worker
            - --loglevel=info
            - -Q
            - planning_queue,execution_queue,validation_queue,reflection_queue,high_priority_queue,approval_queue,observability_queue,low_priority_queue
          envFrom:
            - configMapRef:
                name: NeuralCleave-config
            - secretRef:
                name: NeuralCleave-secrets
          resources:
            requests:
              cpu: "500m"
              memory: "1Gi"
            limits:
              cpu: "2000m"
              memory: "4Gi"
          livenessProbe:
            exec:
              command:
                - celery
                - -A
                - app.workers.celery_app
                - inspect
                - ping
                - -d
                - celery@$HOSTNAME
            initialDelaySeconds: 30
            periodSeconds: 60
            timeoutSeconds: 10
