# ─────────────────────────────────────────────────────────────────────────────
# NeuralCleave — Kubernetes Secrets Template
#
# ⚠️  THIS FILE IS A TEMPLATE — NEVER COMMIT REAL VALUES.
#      Replace every REPLACE_WITH_* placeholder with the actual base64-encoded
#      value before applying to your cluster.
#
# How to base64-encode a value:
#   echo -n 'my_secret_value' | base64
#
# How to generate a strong random key (32 bytes):
#   openssl rand -base64 32
#
# Apply (after filling real values):
#   kubectl apply -f deploy/k8s/secrets.yaml
#
# Preferred alternative — use SealedSecrets or External Secrets Operator:
#   https://github.com/bitnami-labs/sealed-secrets
#   https://external-secrets.io/
#
# The Secret name MUST remain "NeuralCleave-secrets" — all Deployments reference
# it via:
#     envFrom:
#       - secretRef:
#           name: NeuralCleave-secrets
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: v1
kind: Secret
metadata:
  name: NeuralCleave-secrets
  namespace: NeuralCleave
  labels:
    app: NeuralCleave
    component: secrets
type: Opaque
# Use `stringData` during cluster setup — K8s will base64-encode automatically.
# Switch to `data` (pre-encoded) for GitOps pipelines.
stringData:
  # ── Application ─────────────────────────────────────────────────────────────
  # JWT signing secret — generate with: openssl rand -base64 48
  SECRET_KEY: "REPLACE_WITH_STRONG_RANDOM_SECRET"

  # ── Database — PostgreSQL ───────────────────────────────────────────────────
  POSTGRES_USER:     "NeuralCleave"
  POSTGRES_PASSWORD: "REPLACE_WITH_POSTGRES_PASSWORD"

  # ── Database — Redis ─────────────────────────────────────────────────────────
  REDIS_PASSWORD: "REPLACE_WITH_REDIS_PASSWORD"

  # ── Database — Neo4j ─────────────────────────────────────────────────────────
  NEO4J_PASSWORD: "REPLACE_WITH_NEO4J_PASSWORD"

  # ── Database — Qdrant ────────────────────────────────────────────────────────
  # Leave blank if Qdrant runs without authentication (internal cluster only)
  QDRANT_API_KEY: "REPLACE_WITH_QDRANT_API_KEY_OR_LEAVE_BLANK"

  # ── AI Model API Keys ────────────────────────────────────────────────────────
  GEMINI_API_KEY:   "REPLACE_WITH_GEMINI_API_KEY"
  DEEPSEEK_API_KEY: "REPLACE_WITH_DEEPSEEK_API_KEY"

  # ── Webhook Secrets ─────────────────────────────────────────────────────────
  # GitHub webhook HMAC secret — generate with: openssl rand -hex 32
  GITHUB_WEBHOOK_SECRET: "REPLACE_WITH_GITHUB_WEBHOOK_SECRET"

  # ── Monitoring ──────────────────────────────────────────────────────────────
  GRAFANA_ADMIN_USER:     "admin"
  GRAFANA_ADMIN_PASSWORD: "REPLACE_WITH_GRAFANA_ADMIN_PASSWORD"
