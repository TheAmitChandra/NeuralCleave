# ─────────────────────────────────────────────────────────────────────────────
# NeuralCleave — NGINX Reverse Proxy Configuration
# Handles TLS termination, request routing, and security hardening.
#
# Upstream layout:
#   backend  → FastAPI  on port 8000  (API, WebSocket, MCP)
#   frontend → Next.js  on port 3000  (UI)
#
# Port mapping:
#   80  → redirect to 443
#   443 → TLS terminated, routed by path prefix
# ─────────────────────────────────────────────────────────────────────────────

worker_processes  auto;
error_log         /var/log/nginx/error.log warn;
pid               /var/run/nginx.pid;

events {
    worker_connections 1024;
    use                epoll;
    multi_accept       on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ── Logging ────────────────────────────────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;

    # ── Performance ────────────────────────────────────────────────────────
    sendfile            on;
    tcp_nopush          on;
    tcp_nodelay         on;
    keepalive_timeout   65;
    types_hash_max_size 2048;
    client_max_body_size 32m;

    # ── Gzip ───────────────────────────────────────────────────────────────
    gzip              on;
    gzip_vary         on;
    gzip_proxied      any;
    gzip_comp_level   6;
    gzip_buffers      16 8k;
    gzip_http_version 1.1;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml+rss
        application/atom+xml
        image/svg+xml;

    # ── Rate limiting zones ────────────────────────────────────────────────
    # 60 req/min per IP for API endpoints
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=60r/m;
    # 20 req/min per IP for auth endpoints (brute-force protection)
    limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=20r/m;
    # 200 req/min per IP for static assets
    limit_req_zone $binary_remote_addr zone=static_limit:10m rate=200r/m;

    # ── Upstream — FastAPI backend ─────────────────────────────────────────
    upstream backend {
        server backend:8000;
        keepalive 32;
    }

    # ── Upstream — Next.js frontend ────────────────────────────────────────
    upstream frontend {
        server frontend:3000;
        keepalive 16;
    }

    # ── Hide NGINX version ─────────────────────────────────────────────────
    server_tokens off;

    # ── HTTP → HTTPS redirect ──────────────────────────────────────────────
    server {
        listen      80;
        listen      [::]:80;
        server_name _;

        # ACME challenge for Let's Encrypt certificate renewal
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ── HTTPS — main server ────────────────────────────────────────────────
    server {
        listen      443 ssl;
        listen      [::]:443 ssl;
        server_name _;
        http2       on;

        # ── TLS certificates (mount via docker volume or secret) ──────────
        ssl_certificate     /etc/nginx/certs/cert.pem;
        ssl_certificate_key /etc/nginx/certs/key.pem;

        # ── TLS hardening ─────────────────────────────────────────────────
        ssl_protocols             TLSv1.2 TLSv1.3;
        ssl_ciphers               ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
        ssl_prefer_server_ciphers off;
        ssl_session_cache         shared:SSL:10m;
        ssl_session_timeout       1d;
        ssl_session_tickets       off;
        ssl_stapling              on;
        ssl_stapling_verify       on;

        # ── Security headers ──────────────────────────────────────────────
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        add_header X-Content-Type-Options    "nosniff"                                      always;
        add_header X-Frame-Options           "SAMEORIGIN"                                   always;
        add_header X-XSS-Protection          "1; mode=block"                                always;
        add_header Referrer-Policy           "strict-origin-when-cross-origin"              always;
        add_header Permissions-Policy        "camera=(), microphone=(), geolocation=()"     always;
        add_header Content-Security-Policy
            "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self' data:; connect-src 'self' wss: https:; frame-ancestors 'none';"
            always;

        # ── Proxy common settings ─────────────────────────────────────────
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
        proxy_buffering    off;

        # ── Auth endpoints (stricter rate limit) ──────────────────────────
        location /api/v1/auth/ {
            limit_req zone=auth_limit burst=10 nodelay;
            limit_req_status 429;

            proxy_pass http://backend;
        }

        # ── WebSocket — agent events stream ───────────────────────────────
        location /ws/ {
            proxy_pass          http://backend;
            proxy_set_header    Upgrade    $http_upgrade;
            proxy_set_header    Connection "upgrade";
            proxy_read_timeout  3600s;
            proxy_send_timeout  3600s;
        }

        # ── REST API ──────────────────────────────────────────────────────
        location /api/ {
            limit_req zone=api_limit burst=30 nodelay;
            limit_req_status 429;

            proxy_pass http://backend;
        }

        # ── MCP JSON-RPC ──────────────────────────────────────────────────
        location /mcp/ {
            limit_req zone=api_limit burst=20 nodelay;
            limit_req_status 429;

            proxy_pass http://backend;
        }

        # ── FastAPI built-in docs (restrict in production) ────────────────
        location ~ ^/(docs|redoc|openapi.json) {
            # Remove or restrict access in production; kept open for development
            proxy_pass http://backend;
        }

        # ── Next.js — static assets (aggressive caching) ──────────────────
        location /_next/static/ {
            limit_req zone=static_limit burst=100 nodelay;

            proxy_pass http://frontend;
            proxy_cache_valid 200 365d;
            add_header Cache-Control "public, max-age=31536000, immutable";
        }

        # ── Next.js — all other requests ──────────────────────────────────
        location / {
            proxy_pass http://frontend;
        }

        # ── Health check (internal, bypass rate limits) ───────────────────
        location /health {
            access_log off;
            proxy_pass http://backend/health;
        }
    }
}
