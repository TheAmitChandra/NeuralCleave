# CortexFlow OpenTelemetry Collector — Development Configuration
#
# Used by deploy/docker-compose.dev.yml.
# The backend runs on the host; it sends OTLP gRPC to host.docker.internal:4317
# which docker-compose maps to this container.
#
# Design choices vs production config:
#   • memory_limiter is more permissive (64 MiB / no spike limit) — dev machine
#   • batch processor uses shorter timeouts for faster feedback
#   • debug exporter verbosity: detailed (shows full spans in container logs)
#   • No Zipkin receiver (simplifies local setup)
#   • Prometheus exporter scrape port 8889 (prometheus.dev.yml points here)
#   • pprof + zpages enabled on standard ports for profiling during dev

extensions:
  health_check:
    endpoint: 0.0.0.0:13133

  pprof:
    endpoint: 0.0.0.0:1777

  zpages:
    endpoint: 0.0.0.0:55679

receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  memory_limiter:
    check_interval: 2s
    limit_mib: 64

  batch:
    timeout: 2s
    send_batch_size: 256

  resource:
    attributes:
      - key: deployment.environment
        value: development
        action: upsert
      - key: service.namespace
        value: cortexflow
        action: upsert

exporters:
  debug:
    verbosity: detailed   # full span/metric details printed to container stdout

  prometheus:
    endpoint: 0.0.0.0:8889
    namespace: cortexflow_otel
    resource_to_telemetry_conversion:
      enabled: true

service:
  extensions: [health_check, pprof, zpages]

  pipelines:
    traces:
      receivers: [otlp]
      processors: [memory_limiter, resource, batch]
      exporters: [debug]

    metrics:
      receivers: [otlp]
      processors: [memory_limiter, batch]
      exporters: [debug, prometheus]

    logs:
      receivers: [otlp]
      processors: [memory_limiter, batch]
      exporters: [debug]
